<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Clickable Kitchen</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #2ed573;
            --dark: #2f3542;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: #fff9e6;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Animated Background Blobs */
        .blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: floatBlob 20s infinite alternate;
        }

        @keyframes floatBlob {
            0% { transform: translate(-20%, -20%) scale(1); }
            100% { transform: translate(20%, 20%) scale(1.2); }
        }

        /* Control Panel */
        .panel {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            backdrop-filter: blur(10px);
            text-align: center;
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.5);
        }

        h1 { font-family: 'Lobster', cursive; color: var(--primary); font-size: 2.8rem; margin: 0 0 15px 0; }

        .input-stack { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

        input {
            padding: 12px 20px;
            border-radius: 15px;
            border: 2px solid #eee;
            outline: none;
            font-family: inherit;
        }

        input:focus { border-color: var(--primary); }

        .swirly-btn {
            font-family: 'Lobster', cursive;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 1.8rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 15px rgba(255, 71, 87, 0.2);
        }

        .swirly-btn:hover { transform: scale(1.05) rotate(-1deg); background: #ff6b81; }

        /* Clickable Recipe Card */
        #recipe-link {
            text-decoration: none;
            color: inherit;
            display: none;
            width: 100%;
            max-width: 550px;
            transition: transform 0.3s ease;
        }

        #recipe-link:hover { transform: translateY(-10px); }

        #recipe-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
        }

        #recipe-card img { width: 100%; height: 320px; object-fit: cover; }

        .card-body { padding: 25px; text-align: center; }

        .badge {
            display: inline-block;
            background: #f1f2f6;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 10px;
            color: #57606f;
        }

        .click-hint {
            font-size: 0.8rem;
            color: var(--secondary);
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 15px;
        }

        .food-emoji {
            position: fixed;
            z-index: -1;
            pointer-events: none;
            animation: fall 10s linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="blob"></div>

    <div class="panel">
        <h1>Fridge Vibe</h1>
        <div class="input-stack">
            <input type="text" id="ing-input" placeholder="What's your main ingredient?">
        </div>
        <button class="swirly-btn" onclick="getRecipe()">Get Cooking</button>
    </div>

    <a id="recipe-link" target="_blank" rel="noopener noreferrer">
        <div id="recipe-card">
            <img id="meal-img" src="" alt="Recipe">
            <div class="card-body">
                <div class="badge" id="meal-cat">Category</div>
                <h2 id="meal-name" style="font-family: 'Lobster', cursive; margin: 0; font-size: 2rem;"></h2>
                <p id="meal-preview" style="font-size: 0.95rem; color: #555; margin-top: 10px;"></p>
                <div class="click-hint">✨ Click to view full recipe website ✨</div>
            </div>
        </div>
    </a>

    <script>
        // Background Food Confetti
        const food = ['🍔','🍕','🌮','🍜','🥗','🥐','🥑','🍩'];
        function spawnFood() {
            const f = document.createElement('div');
            f.className = 'food-emoji';
            f.innerText = food[Math.floor(Math.random() * food.length)];
            f.style.left = Math.random() * 100 + 'vw';
            f.style.fontSize = Math.random() * 20 + 20 + 'px';
            f.style.animationDuration = (Math.random() * 5 + 5) + 's';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 10000);
        }
        setInterval(spawnFood, 800);

        async function getRecipe() {
            const input = document.getElementById('ing-input').value.trim();
            const btn = document.querySelector('.swirly-btn');
            const link = document.getElementById('recipe-link');
            
            btn.innerText = "Whisking...";

            let url = 'https://www.themealdb.com/api/json/v1/1/random.php';
            if(input) url = `https://www.themealdb.com/api/json/v1/1/filter.php?i=${input}`;

            try {
                const res = await fetch(url);
                const data = await res.json();

                if(!data.meals) {
                    alert("No matches! Try a basic ingredient like 'Chicken' or 'Eggs'.");
                    btn.innerText = "Get Cooking";
                    return;
                }

                // Randomly pick one if filtered, then get details
                let meal = data.meals[Math.floor(Math.random() * data.meals.length)];
                const detailRes = await fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${meal.idMeal}`);
                const detailData = await detailRes.json();
                const fullMeal = detailData.meals[0];

                // Update Content
                document.getElementById('meal-img').src = fullMeal.strMealThumb;
                document.getElementById('meal-name').innerText = fullMeal.strMeal;
                document.getElementById('meal-cat').innerText = fullMeal.strArea + " " + fullMeal.strCategory;
                document.getElementById('meal-preview').innerText = fullMeal.strInstructions.substring(0, 150) + "...";

                // Set Click Action (Use strSource or fallback to Google Search)
                const sourceUrl = fullMeal.strSource || `https://www.google.com/search?q=${encodeURIComponent(fullMeal.strMeal + " recipe")}`;
                link.href = sourceUrl;

                // Show Card
                link.style.display = 'block';
                link.scrollIntoView({ behavior: 'smooth' });
                btn.innerText = "Find Another";

            } catch (err) {
                console.error(err);
                btn.innerText = "Error! Try Again";
            }
        }
    </script>
</body>
</html>
