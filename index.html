<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Smart Fridge Vibe</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #2ed573;
            --dark: #2f3542;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #fff9e6 0%, #ffecd2 100%);
            overflow-x: hidden;
            padding: 20px;
        }

        /* Animated Background Elements */
        .bg-shape {
            position: fixed;
            z-index: -1;
            filter: blur(50px);
            border-radius: 50%;
            opacity: 0.5;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        /* Top Controls */
        .fridge-panel {
            background: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            backdrop-filter: blur(15px);
            text-align: center;
            width: 95%;
            max-width: 550px;
            z-index: 10;
            border: 2px solid white;
            margin-bottom: 30px;
        }

        h1 { font-family: 'Lobster', cursive; color: var(--primary); font-size: 2.5rem; margin: 0 0 10px 0; }

        .pantry-note {
            font-size: 0.8rem;
            color: #666;
            background: #f1f2f6;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            padding: 12px 20px;
            border-radius: 15px;
            border: 2px solid #dfe4ea;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus { border-color: var(--secondary); }

        .type-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .chip {
            padding: 8px 18px;
            border-radius: 20px;
            background: white;
            border: 2px solid #dfe4ea;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .chip {
            background: var(--secondary);
            color: white;
            border-color: var(--secondary);
        }

        .swirly-btn {
            font-family: 'Lobster', cursive;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 45px;
            font-size: 1.8rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.3);
            transition: 0.3s;
        }

        .swirly-btn:hover { transform: translateY(-3px) scale(1.02); background: #ff6b81; }

        /* Results Card */
        #recipe-result {
            display: none;
            background: white;
            width: 95%;
            max-width: 600px;
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 50px;
        }

        #recipe-result img { width: 100%; height: 300px; object-fit: cover; }
        
        .recipe-content { padding: 30px; text-align: center; }
        .recipe-content h2 { font-family: 'Lobster', cursive; margin: 0; color: var(--dark); }

        .emoji-float {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            font-size: 1.5rem;
            animation: fall 8s linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        @keyframes popUp {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="bg-shape" style="width: 300px; height: 300px; background: #ffcc33; top: 10%; left: -5%;"></div>
    <div class="bg-shape" style="width: 400px; height: 400px; background: #ff6b6b; bottom: -10%; right: -5%;"></div>

    <div class="fridge-panel">
        <h1>Smart Fridge</h1>
        <div class="pantry-note">We'll assume you have: Salt, Oil, Water, Pepper & Flour</div>
        
        <div class="input-group">
            <input type="text" id="ing1" placeholder="Main Ingredient (e.g. Beef)">
            <input type="text" id="ing2" placeholder="Secondary (e.g. Potato)">
            <input type="text" id="ing3" placeholder="Vibe Adder (e.g. Lemon)">
        </div>

        <div class="type-selector">
            <label><input type="radio" name="vibe" value="" checked><span class="chip">Anything</span></label>
            <label><input type="radio" name="vibe" value="Dessert"><span class="chip">Dessert</span></label>
            <label><input type="radio" name="vibe" value="Side"><span class="chip">Side</span></label>
            <label><input type="radio" name="vibe" value="Breakfast"><span class="chip">Breakfast</span></label>
        </div>

        <button class="swirly-btn" onclick="generateRecipe()">Mix the Vibe</button>
    </div>

    <div id="recipe-result">
        <img id="meal-img" src="" alt="Tasty Food">
        <div class="recipe-content">
            <h2 id="meal-name">Recipe Title</h2>
            <p id="meal-tags" style="color: var(--secondary); font-weight: bold; margin-top: 5px;"></p>
            <p id="meal-steps" style="color: #57606f; line-height: 1.6;"></p>
            <button class="swirly-btn" style="font-size: 1.2rem; padding: 10px 30px;" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">Try New Ingredients</button>
        </div>
    </div>

    <script>
        const emojis = ['🥦', '🍖', '🥚', '🧀', '🍄', '🍗', '🍤', '🍝'];
        
        function createConfetti() {
            const e = document.createElement('div');
            e.className = 'emoji-float';
            e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            e.style.left = Math.random() * 100 + 'vw';
            e.style.animationDuration = (Math.random() * 3 + 5) + 's';
            document.body.appendChild(e);
            setTimeout(() => e.remove(), 8000);
        }
        setInterval(createConfetti, 700);

        async function generateRecipe() {
            const btn = document.querySelector('.swirly-btn');
            const result = document.getElementById('recipe-result');
            
            // Get values
            const ingredients = [
                document.getElementById('ing1').value.trim(),
                document.getElementById('ing2').value.trim(),
                document.getElementById('ing3').value.trim()
            ].filter(x => x !== "");

            const vibe = document.querySelector('input[name="vibe"]:checked').value;

            btn.innerText = "Cooking...";
            
            try {
                let meal = null;

                // Priority 1: Search by the first ingredient if provided
                if (ingredients.length > 0) {
                    const res = await fetch(`https://www.themealdb.com/api/json/v1/1/filter.php?i=${ingredients[0]}`);
                    const data = await res.json();
                    if (data.meals) {
                        meal = data.meals[Math.floor(Math.random() * data.meals.length)];
                    }
                } 
                
                // Priority 2: If no ingredients or search failed, search by category (vibe)
                if (!meal && vibe) {
                    const res = await fetch(`https://www.themealdb.com/api/json/v1/1/filter.php?c=${vibe}`);
                    const data = await res.json();
                    if (data.meals) {
                        meal = data.meals[Math.floor(Math.random() * data.meals.length)];
                    }
                }

                // Final Fallback: Random
                if (!meal) {
                    const res = await fetch(`https://www.themealdb.com/api/json/v1/1/random.php`);
                    const data = await res.json();
                    meal = data.meals[0];
                }

                // Get full details
                const detailRes = await fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${meal.idMeal}`);
                const detailData = await detailRes.json();
                const fullMeal = detailData.meals[0];

                // Update UI
                document.getElementById('meal-img').src = fullMeal.strMealThumb;
                document.getElementById('meal-name').innerText = fullMeal.strMeal;
                document.getElementById('meal-tags').innerText = `#${fullMeal.strCategory} #${fullMeal.strArea}`;
                
                // Show first few steps
                const steps = fullMeal.strInstructions.split('.').slice(0, 3).join('.') + '...';
                document.getElementById('meal-steps').innerText = steps;

                result.style.display = 'block';
                result.scrollIntoView({ behavior: 'smooth' });
                btn.innerText = "Mix Again";

            } catch (err) {
                btn.innerText = "Oops! Try again";
                console.error(err);
            }
        }
    </script>
</body>
</html>
