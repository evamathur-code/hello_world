<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet Vibe Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fff5e6;
            --accent-color: #ff6b6b;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            transition: background-color 0.5s ease;
            overflow-x: hidden;
        }

        /* Swirly Button Styling */
        .recipe-button {
            font-family: 'Lobster', cursive;
            font-size: 2.5rem;
            padding: 20px 50px;
            cursor: pointer;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin: 20px;
        }

        .recipe-button:hover {
            transform: scale(1.1) rotate(-2deg);
            background: #ff5252;
        }

        .recipe-button:active {
            transform: scale(0.95);
        }

        /* Recipe Card Styling */
        #recipe-card {
            display: none; /* Hidden until button is pressed */
            background: white;
            width: 90%;
            max-width: 600px;
            border-radius: 30px;
            padding: 30px;
            margin-top: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            z-index: 100;
            max-height: 70vh;
            overflow-y: auto;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        #recipe-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        #recipe-card h2 {
            font-family: 'Lobster', cursive;
            color: var(--accent-color);
            font-size: 2.2rem;
            margin: 10px 0;
        }

        .instructions {
            text-align: left;
            line-height: 1.6;
            color: #444;
            font-size: 0.95rem;
        }

        /* Floating Food Emojis */
        .food-emoji {
            position: absolute;
            font-size: 2rem;
            z-index: 1;
            user-select: none;
            pointer-events: none;
            animation: floatUp 6s linear infinite;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

       <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet Vibe Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            /* Animated Background */
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fad0c4, #ffd1ff);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            overflow-x: hidden;
            padding: 20px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Controls Section */
        .controls {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            text-align: center;
            width: 90%;
            max-width: 500px;
            z-index: 100;
            margin-bottom: 20px;
        }

        /* Swirly Button */
        .recipe-button {
            font-family: 'Lobster', cursive;
            font-size: 2rem;
            padding: 12px 40px;
            cursor: pointer;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 15px;
        }

        .recipe-button:hover { transform: scale(1.05); background: #ff5252; }

        input[type="text"] {
            width: 80%;
            padding: 12px;
            border-radius: 25px;
            border: 2px solid #eee;
            margin: 10px 0;
            outline: none;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 10px 0;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }

        /* Recipe Card */
        #recipe-card {
            display: none;
            background: white;
            width: 90%;
            max-width: 600px;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            z-index: 100;
            animation: slideUp 0.5s ease-out;
        }

        #recipe-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 20px;
        }

        h2 { font-family: 'Lobster', cursive; color: var(--primary); margin: 15px 0 5px 0; }

        .food-emoji {
            position: absolute;
            z-index: 1;
            pointer-events: none;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="controls">
        <h3 style="margin-top:0">What's in the fridge?</h3>
        <input type="text" id="ingredient-input" placeholder="e.g. Chicken, Tomato...">
        
        <div class="filters">
            <label><input type="radio" name="cat" value="" checked> All</label>
            <label><input type="radio" name="cat" value="Dessert"> Dessert</label>
            <label><input type="radio" name="cat" value="Seafood"> Seafood</label>
            <label><input type="radio" name="cat" value="Vegetarian"> Veggie</label>
        </div>

        <button class="recipe-button" onclick="fetchRecipe()">Random Recipe</button>
    </div>

    <div id="recipe-card">
        <img id="meal-img" src="" alt="">
        <h2 id="meal-name"></h2>
        <p id="meal-desc" style="font-size: 0.9rem; line-height: 1.4; color: #555;"></p>
    </div>

    <script>
        // Floating Emojis Logic
        const emojis = ['🍕', '🍩', '🥑', '🥞', '🍣', '🍦', '🌮', '🍓'];
        function spawnEmoji() {
            const e = document.createElement('div');
            e.className = 'food-emoji';
            e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            e.style.left = Math.random() * 95 + 'vw';
            e.style.fontSize = Math.random() * 20 + 20 + 'px';
            e.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(e);
            setTimeout(() => e.remove(), 7000);
        }
        setInterval(spawnEmoji, 500);

        async function fetchRecipe() {
            const ingredient = document.getElementById('ingredient-input').value.trim();
            const category = document.querySelector('input[name="cat"]:checked').value;
            const btn = document.querySelector('.recipe-button');
            const card = document.getElementById('recipe-card');

            btn.innerText = "Searching...";
            
            let url = 'https://www.themealdb.com/api/json/v1/1/random.php';

            // If user typed an ingredient, we search by ingredient first
            if (ingredient) {
                url = `https://www.themealdb.com/api/json/v1/1/filter.php?i=${ingredient}`;
            } else if (category) {
                url = `https://www.themealdb.com/api/json/v1/1/filter.php?c=${category}`;
            }

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (!data.meals) {
                    alert("No recipes found with that ingredient! Try something else.");
                    btn.innerText = "Random Recipe";
                    return;
                }

                // If we used a filter, we get a list. Pick a random one from that list.
                // Then fetch the full details for that specific meal ID.
                let meal = data.meals[Math.floor(Math.random() * data.meals.length)];
                const detailRes = await fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${meal.idMeal}`);
                const detailData = await detailRes.json();
                meal = detailData.meals[0];

                // Update UI
                document.getElementById('meal-img').src = meal.strMealThumb;
                document.getElementById('meal-name').innerText = meal.strMeal;
                document.getElementById('meal-desc').innerText = meal.strInstructions.substring(0, 200) + "...";
                
                card.style.display = 'block';
                btn.innerText = "Cook Another!";
            } catch (e) {
                btn.innerText = "Error! Try again";
            }
        }
    </script>
</body>
</html>
