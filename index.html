<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet Vibe Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fff5e6;
            --accent-color: #ff6b6b;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            transition: background-color 0.5s ease;
            overflow-x: hidden;
        }

        /* Swirly Button Styling */
        .recipe-button {
            font-family: 'Lobster', cursive;
            font-size: 2.5rem;
            padding: 20px 50px;
            cursor: pointer;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin: 20px;
        }

        .recipe-button:hover {
            transform: scale(1.1) rotate(-2deg);
            background: #ff5252;
        }

        .recipe-button:active {
            transform: scale(0.95);
        }

        /* Recipe Card Styling */
        #recipe-card {
            display: none; /* Hidden until button is pressed */
            background: white;
            width: 90%;
            max-width: 600px;
            border-radius: 30px;
            padding: 30px;
            margin-top: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            z-index: 100;
            max-height: 70vh;
            overflow-y: auto;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        #recipe-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        #recipe-card h2 {
            font-family: 'Lobster', cursive;
            color: var(--accent-color);
            font-size: 2.2rem;
            margin: 10px 0;
        }

        .instructions {
            text-align: left;
            line-height: 1.6;
            color: #444;
            font-size: 0.95rem;
        }

        /* Floating Food Emojis */
        .food-emoji {
            position: absolute;
            font-size: 2rem;
            z-index: 1;
            user-select: none;
            pointer-events: none;
            animation: floatUp 6s linear infinite;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Scrollbar styling for the card */
        #recipe-card::-webkit-scrollbar { width: 8px; }
        #recipe-card::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }
    </style>
</head>
<body>

    <button class="recipe-button" onclick="getRandomRecipe()">Random Recipe</button>

    <div id="recipe-card">
        <img id="food-img" src="" alt="Food Picture">
        <h2 id="food-title">Recipe Name</h2>
        <div class="instructions" id="food-instructions"></div>
    </div>

    <script>
        const foodEmojis = ['🍕', '🍔', '🌮', '🍜', '🍱', '🥗', '🍩', '🥐', '🍓', '🥑', '🥞', '🍣'];

        // Create initial floating background
        function createBackgroundFood() {
            for (let i = 0; i < 15; i++) {
                spawnEmoji();
            }
        }

        function spawnEmoji() {
            const emoji = document.createElement('div');
            emoji.className = 'food-emoji';
            emoji.innerText = foodEmojis[Math.floor(Math.random() * foodEmojis.length)];
            emoji.style.left = Math.random() * 100 + 'vw';
            emoji.style.bottom = '-10vh';
            
            // Randomize animation speed and delay
            const duration = Math.random() * 4 + 6;
            emoji.style.animationDuration = duration + 's';
            emoji.style.animationDelay = Math.random() * 5 + 's';
            
            document.body.appendChild(emoji);
            
            // Re-spawn after it finishes
            setTimeout(() => {
                emoji.remove();
                spawnEmoji();
            }, (duration + 5) * 1000);
        }

        async function getRandomRecipe() {
            const button = document.querySelector('.recipe-button');
            const card = document.getElementById('recipe-card');
            
            button.innerText = "Cooking...";
            button.disabled = true;

            try {
                // Fetch from TheMealDB (Free, No API key required)
                const response = await fetch('https://www.themealdb.com/api/json/v1/1/random.php');
                const data = await response.json();
                const meal = data.meals[0];

                // Update UI
                document.getElementById('food-img').src = meal.strMealThumb;
                document.getElementById('food-title').innerText = meal.strMeal;
                
                // Format instructions (limit length for clean look)
                const instructions = meal.strInstructions.split('. ').slice(0, 5).join('. ') + '...';
                document.getElementById('food-instructions').innerHTML = `
                    <strong>Category:</strong> ${meal.strCategory} | <strong>Origin:</strong> ${meal.strArea}<br><br>
                    ${instructions}
                `;

                // Show the card
                card.style.display = 'block';
                button.innerText = "Gimme Another!";
                
                // Change background color based on food category
                const hues = { 'Vegetarian': 120, 'Beef': 0, 'Chicken': 40, 'Seafood': 200, 'Dessert': 300 };
                const hue = hues[meal.strCategory] || Math.random() * 360;
                document.body.style.backgroundColor = `hsl(${hue}, 60%, 95%)`;

            } catch (error) {
                console.error("Error fetching recipe:", error);
                button.innerText = "Error! Try again?";
            } finally {
                button.disabled = false;
            }
        }

        // Initialize background on load
        createBackgroundFood();
    </script>
</body>
</html>
