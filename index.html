<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ingredient Alchemist</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff9f43;
            --primary: #ee5253;
            --dark: #222f3e;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: #1e1e2e;
            color: white;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Animated Kitchen Vibe Background */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #1e1e2e 0%, #2d3436 100%);
            z-index: -2;
        }

        .floating-emoji {
            position: fixed;
            font-size: 2rem;
            z-index: -1;
            opacity: 0.2;
            animation: floatAround 15s infinite linear;
        }

        @keyframes floatAround {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(100px, 100px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* Input Section */
        .chef-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        h1 { font-family: 'Lobster', cursive; font-size: 3rem; margin: 0 0 10px 0; color: var(--accent); }
        p { font-size: 0.9rem; margin-bottom: 25px; opacity: 0.8; }

        .ingredient-inputs {
            display: grid;
            gap: 12px;
            margin-bottom: 25px;
        }

        input {
            background: rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); background: rgba(0,0,0,0.4); }

        .magic-btn {
            font-family: 'Lobster', cursive;
            background: linear-gradient(to right, var(--accent), var(--primary));
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.8rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 10px 20px rgba(238, 82, 83, 0.3);
        }

        .magic-btn:hover { transform: translateY(-3px) scale(1.03); filter: brightness(1.1); }

        /* Clickable Result Card */
        #recipe-link {
            text-decoration: none;
            display: none;
            width: 100%;
            max-width: 600px;
            animation: slideIn 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background: white;
            color: var(--dark);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .result-card:hover { transform: scale(1.02); }

        .result-card img { width: 100%; height: 350px; object-fit: cover; }
        .card-content { padding: 30px; text-align: center; }

        .tag {
            background: #ffeaa7;
            color: #d35400;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        .click-badge {
            margin-top: 20px;
            font-weight: bold;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="chef-card">
        <h1>Ingredient Lab</h1>
        <p>Enter 3 ingredients. We'll find a match!</p>
        
        <div class="ingredient-inputs">
            <input type="text" id="i1" placeholder="Primary (e.g., Chicken)">
            <input type="text" id="i2" placeholder="Secondary (e.g., Garlic)">
            <input type="text" id="i3" placeholder="Third (e.g., Onion)">
        </div>

        <button class="magic-btn" onclick="brewRecipe()">Brew Recipe</button>
    </div>

    <a id="recipe-link" target="_blank">
        <div class="result-card">
            <img id="res-img" src="" alt="Food">
            <div class="card-content">
                <span class="tag" id="res-tag">Category</span>
                <h2 id="res-title" style="font-family: 'Lobster', cursive; font-size: 2.2rem; margin: 10px 0;"></h2>
                <p id="res-desc" style="color: #636e72; line-height: 1.6;"></p>
                <div class="click-badge">👉 Click to see full instructions 👈</div>
            </div>
        </div>
    </a>

    <script>
        // Background Effects
        const foodItems = ['🥘', '🍳', '🧂', '🥦', '🥩', '🌶️', '🍅', '🥢'];
        foodItems.forEach(emoji => {
            const div = document.createElement('div');
            div.className = 'floating-emoji';
            div.innerText = emoji;
            div.style.left = Math.random() * 90 + 'vw';
            div.style.top = Math.random() * 90 + 'vh';
            div.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(div);
        });

        async function brewRecipe() {
            const btn = document.querySelector('.magic-btn');
            const link = document.getElementById('recipe-link');
            const inputs = [
                document.getElementById('i1').value.trim(),
                document.getElementById('i2').value.trim(),
                document.getElementById('i3').value.trim()
            ].filter(x => x !== "");

            if (inputs.length === 0) {
                alert("Add at least one ingredient!");
                return;
            }

            btn.innerText = "Simmering...";

            try {
                // 1. Search by the primary ingredient
                const searchRes = await fetch(`https://www.themealdb.com/api/json/v1/1/filter.php?i=${inputs[0]}`);
                const searchData = await searchRes.json();

                if (!searchData.meals) {
                    alert("No recipes found with those ingredients. Try basics like 'Beef' or 'Rice'.");
                    btn.innerText = "Brew Recipe";
                    return;
                }

                // 2. Fetch full details for a few candidates to check for secondary ingredients
                let bestMatch = null;
                const candidates = searchData.meals.slice(0, 10); // Check top 10 results

                for (let m of candidates) {
                    const dRes = await fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${m.idMeal}`);
                    const dData = await dRes.json();
                    const fullMeal = dData.meals[0];
                    const allText = (fullMeal.strInstructions + fullMeal.strIngredients1).toLowerCase();

                    // Check if other ingredients are mentioned in the recipe text/instructions
                    const matchesAll = inputs.every(ing => allText.includes(ing.toLowerCase()));
                    
                    if (matchesAll) {
                        bestMatch = fullMeal;
                        break;
                    }
                    bestMatch = fullMeal; // Fallback to the first one found if no perfect triple match
                }

                // 3. Update UI
                document.getElementById('res-img').src = bestMatch.strMealThumb;
                document.getElementById('res-title').innerText = bestMatch.strMeal;
                document.getElementById('res-tag').innerText = `${bestMatch.strArea} ${bestMatch.strCategory}`;
                document.getElementById('res-desc').innerText = bestMatch.strInstructions.substring(0, 180) + "...";
                
                link.href = bestMatch.strSource || `https://www.google.com/search?q=${encodeURIComponent(bestMatch.strMeal + " recipe")}`;
                link.style.display = 'block';
                link.scrollIntoView({ behavior: 'smooth' });
                
                btn.innerText = "Brew Another";

            } catch (err) {
                console.error(err);
                btn.innerText = "Error! Try again";
            }
        }
    </script>
</body>
</html>
