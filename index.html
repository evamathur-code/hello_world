<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Checker</title>
    <style>
        /* Modern Reset & Centering */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            background-color: #f0f2f5;
            overflow: hidden;
        }

        /* Large Vibe Text */
        #vibe-display {
            font-size: 5rem;
            font-weight: 800;
            margin-bottom: 2rem;
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: -2px;
            text-align: center;
        }

        /* Modern Button Styling */
        .vibe-button {
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, background 0.3s, box-shadow 0.3s;
        }

        .vibe-button:hover {
            transform: translateY(-3px);
            background: rgba(0, 0, 0, 1);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .vibe-button:active {
            transform: translateY(0);
        }

        /* Responsive scaling for mobile */
        @media (max-width: 600px) {
            #vibe-display { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div id="vibe-display">Ready?</div>
    <button class="vibe-button" onclick="changeVibe()">Change the Vibe</button>

    <script>
        const vibes = [
            "Chill Mode",
            "Party Time",
            "Focus On",
            "Golden Hour",
            "Midnight City",
            "Electric Soul",
            "Deep Work",
            "Neon Dreams"
        ];

        function getRandomColor() {
            // Generating vibrant but readable colors
            const h = Math.floor(Math.random() * 360);
            const s = 60 + Math.random() * 20; // 60-80% saturation
            const l = 70 + Math.random() * 15; // 70-85% lightness for pastel/bright look
            return `hsl(${h}, ${s}%, ${l}%)`;
        }

        function changeVibe() {
            const display = document.getElementById('vibe-display');
            const body = document.body;

            // Pick a random vibe from the array
            const randomVibe = vibes[Math.floor(Math.random() * vibes.length)];
            
            // Apply changes
            display.innerText = randomVibe;
            body.style.backgroundColor = getRandomColor();
        }
    </script>
</body>
</html>
